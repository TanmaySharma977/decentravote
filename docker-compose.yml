version: '3.9'

services:

  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: dv_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  # ── Hardhat Local Blockchain ─────────────────────────────
  hardhat:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: dv_hardhat
    restart: unless-stopped
    ports:
      - "8545:8545"
    volumes:
      - hardhat_artifacts:/app/artifacts   # persist ABI + deploy info

  # ── Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dv_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/decentravote
      - POLYGON_AMOY_RPC=http://hardhat:8545
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - hardhat
    volumes:
      - hardhat_artifacts:/app/artifacts   # read ABI deployed by hardhat container

  # ── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dv_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  hardhat_artifacts:
